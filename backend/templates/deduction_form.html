{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Deduction | NexusPayroll{% endblock %}
{% block page_title %}{% if editing %}Edit Deduction{% else %}New Deduction{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Deduction Type</label>
        <select name="deduction_type">
          <option value="tax" {% if record.deduction_type == 'tax' %}selected{% endif %}>Tax</option>
          <option value="pf" {% if record.deduction_type == 'pf' %}selected{% endif %}>PF</option>
          <option value="esi" {% if record.deduction_type == 'esi' %}selected{% endif %}>ESI</option>
          <option value="insurance" {% if record.deduction_type == 'insurance' %}selected{% endif %}>Insurance</option>
          <option value="loan" {% if record.deduction_type == 'loan' %}selected{% endif %}>Loan</option>
          <option value="other" {% if record.deduction_type == 'other' %}selected{% endif %}>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Percentage</label>
        <input type="number" step="0.01" name="percentage" value="{{ record.percentage|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" name="active" id="id_active" {% if record.active %}checked{% endif %}>
        <label for="id_active" style="margin-bottom:0">Active</label>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Deduction</button>
      <a href="/deductions/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
