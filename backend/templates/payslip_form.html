{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Payslip | NexusPayroll{% endblock %}
{% block page_title %}{% if editing %}Edit Payslip{% else %}New Payslip{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Employee Name</label>
        <input type="text" name="employee_name" value="{{ record.employee_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Month</label>
        <input type="text" name="month" value="{{ record.month|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Year</label>
        <input type="number" name="year" value="{{ record.year|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Gross</label>
        <input type="number" step="0.01" name="gross" value="{{ record.gross|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Deductions</label>
        <input type="number" step="0.01" name="deductions" value="{{ record.deductions|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Net Salary</label>
        <input type="number" step="0.01" name="net_salary" value="{{ record.net_salary|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="processed" {% if record.status == 'processed' %}selected{% endif %}>Processed</option>
          <option value="paid" {% if record.status == 'paid' %}selected{% endif %}>Paid</option>
        </select>
      </div>
      <div class="form-group">
        <label>Generated Date</label>
        <input type="date" name="generated_date" value="{{ record.generated_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Payslip</button>
      <a href="/payslips/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
