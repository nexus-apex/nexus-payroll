{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} PayEmployee | NexusPayroll{% endblock %}
{% block page_title %}{% if editing %}Edit PayEmployee{% else %}New PayEmployee{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Employee Id</label>
        <input type="text" name="employee_id" value="{{ record.employee_id|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Department</label>
        <input type="text" name="department" value="{{ record.department|default:'' }}">
      </div>
      <div class="form-group">
        <label>Designation</label>
        <input type="text" name="designation" value="{{ record.designation|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Basic Salary</label>
        <input type="number" step="0.01" name="basic_salary" value="{{ record.basic_salary|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="inactive" {% if record.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Bank Account</label>
        <input type="text" name="bank_account" value="{{ record.bank_account|default:'' }}">
      </div>
      <div class="form-group">
        <label>Pan Number</label>
        <input type="text" name="pan_number" value="{{ record.pan_number|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} PayEmployee</button>
      <a href="/payemployees/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
